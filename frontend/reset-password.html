<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SchoolHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1f2937;
            --gray: #6b7280;
            --border: #e5e7eb;
        }

        html, body { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            min-height: 100dvh;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
        }

        .login-header { text-align: center; margin-bottom: 40px; }
        .logo-icon { font-size: 60px; margin-bottom: 15px; }
        .logo-text { font-size: 28px; font-weight: 700; color: var(--dark); margin-bottom: 10px; }
        .logo-subtitle { font-size: 14px; color: var(--gray); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 600; color: var(--dark); margin-bottom: 8px; font-size: 14px; }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .alert.show { display: block; }
        .alert-error { background: #fee2e2; color: #991b1b; border-left: 4px solid var(--danger); }
        .alert-success { background: #d1fae5; color: #065f46; border-left: 4px solid var(--success); }

        .login-footer { text-align: center; margin-top: 20px; font-size: 13px; }
        .login-footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">🔑</div>
            <div class="logo-text">Reset Password</div>
            <div class="logo-subtitle">Choose a new password for your account</div>
        </div>

        <div class="alert alert-error" id="errorAlert"></div>
        <div class="alert alert-success" id="successAlert"></div>

        <form id="resetForm" onsubmit="handleReset(event)">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="At least 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter new password" required minlength="8">
            </div>
            <button type="submit" class="login-btn" id="resetBtn">Reset Password</button>
        </form>

        <div class="login-footer">
            <a href="login.html">Back to login</a>
        </div>
    </div>

    <script>
        const API_BASE = (window.location.protocol === "file:" || !window.location.origin || window.location.origin === "null")
            ? "http://127.0.0.1:8000"
            : window.location.origin;

        function showAlert(message, type = "error") {
            const alertId = type === "success" ? "successAlert" : "errorAlert";
            document.getElementById(alertId).textContent = message;
            document.getElementById(alertId).classList.add("show");
        }

        function getTokenFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get("token");
        }

        async function handleReset(event) {
            event.preventDefault();

            const token = getTokenFromUrl();
            if (!token) {
                showAlert("This reset link is missing its token. Please use the link from your email.");
                return;
            }

            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (newPassword !== confirmPassword) {
                showAlert("Passwords do not match.");
                return;
            }

            const btn = document.getElementById("resetBtn");
            btn.disabled = true;
            btn.textContent = "Resetting...";

            try {
                const response = await fetch(API_BASE + "/auth/reset-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token, new_password: newPassword })
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById("resetForm").style.display = "none";
                    showAlert(data.message || "Password reset successfully!", "success");
                    setTimeout(() => { window.location.href = "login.html"; }, 2000);
                } else {
                    showAlert(data.detail || "Something went wrong. Please request a new reset link.");
                    btn.disabled = false;
                    btn.textContent = "Reset Password";
                }
            } catch (error) {
                showAlert("Network error. Please try again.");
                btn.disabled = false;
                btn.textContent = "Reset Password";
            }
        }

        // Warn immediately if there's no token at all (link was malformed/incomplete)
        window.addEventListener("load", () => {
            if (!getTokenFromUrl()) {
                showAlert("This reset link is invalid or incomplete. Please request a new one from the login page.");
                document.getElementById("resetBtn").disabled = true;
            }
        });
    </script>
</body>
</html>
